<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Iris 的星星泡泡守护者</title>
  <meta name="iris-build" content="polished-game-menu-v2">
  <style>
    :root {
      color-scheme: light;
      --ink: #35265f;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --rose: #ff719d;
      --teal: #39c7bc;
      --gold: #ffd44d;
      --sky: #80d4ff;
      --violet: #8068dc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--ink);
      background: #1b1b6d;
      touch-action: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #1b1b6d;
    }

    .hud {
      position: fixed;
      inset: max(12px, env(safe-area-inset-top)) 12px auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      pointer-events: none;
      z-index: 3;
      transition: opacity 180ms ease;
    }

    body.menu-mode .hud {
      opacity: 0;
    }

    .stats,
    .controls,
    .message,
    .start-card {
      border: 2px solid rgba(255, 255, 255, 0.9);
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(52, 92, 139, 0.18);
      backdrop-filter: blur(10px);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: fit-content;
      max-width: min(680px, calc(100vw - 120px));
      padding: 9px;
      border-radius: 8px;
      font-size: clamp(13px, 2.8vw, 17px);
      font-weight: 800;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-self: end;
      padding: 7px;
      border-radius: 8px;
      pointer-events: auto;
    }

    button {
      min-width: 44px;
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(180deg, #ff86ad, #ef5f93);
      box-shadow: inset 0 -2px 0 rgba(106, 32, 67, 0.16), 0 5px 14px rgba(170, 68, 105, 0.2);
      font: 800 15px/1 system-ui, sans-serif;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      background: linear-gradient(180deg, #6bd9d1, #28b9b0);
    }

    .message {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(560px, calc(100vw - 24px));
      min-height: 46px;
      padding: 12px 18px;
      border-radius: 8px;
      text-align: center;
      font-weight: 900;
      font-size: clamp(16px, 4vw, 24px);
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 4;
      pointer-events: none;
    }

    .message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: transparent;
      z-index: 5;
    }

    .overlay.hidden {
      display: none;
    }

    .start-card {
      width: min(720px, 100%);
      border-radius: 8px;
      padding: clamp(16px, 4vw, 28px);
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 246, 255, 0.38)),
        radial-gradient(circle at 24% 18%, rgba(255, 228, 119, 0.5), transparent 28%),
        radial-gradient(circle at 84% 22%, rgba(116, 222, 255, 0.42), transparent 30%);
      box-shadow: 0 24px 48px rgba(22, 18, 94, 0.34), inset 0 0 0 2px rgba(255, 255, 255, 0.78);
      backdrop-filter: none;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 6vw, 54px);
      line-height: 1.04;
      letter-spacing: 0;
      color: #4a3f9b;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.75), 0 9px 20px rgba(83, 57, 160, 0.18);
    }

    .subtitle {
      margin: 0 auto;
      color: #8b3da9;
      font-size: clamp(17px, 4vw, 24px);
      font-weight: 900;
    }

    .menu-status {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 12px auto 0;
    }

    .menu-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 32px;
      padding: 5px 11px;
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #4a3f9b;
      font-size: clamp(13px, 3vw, 15px);
      font-weight: 900;
      box-shadow: 0 7px 16px rgba(73, 64, 145, 0.14);
    }

    .menu-art-window {
      height: clamp(190px, 35vh, 310px);
      margin: clamp(10px, 2.5vw, 16px) auto;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0));
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .icon-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 auto clamp(12px, 3vw, 18px);
      max-width: 500px;
    }

    .icon-card {
      display: grid;
      gap: 4px;
      justify-items: center;
      min-height: 76px;
      padding: 9px 6px;
      border: 2px solid rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      color: #4a3f9b;
      font-size: clamp(13px, 3.2vw, 16px);
      font-weight: 900;
      box-shadow: 0 9px 18px rgba(73, 64, 145, 0.16);
    }

    .icon-card span:first-child {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: #fff;
      background: linear-gradient(180deg, #9eeeff, #6a79f3);
      box-shadow: inset 0 -3px 0 rgba(53, 38, 95, 0.16);
      font-size: 21px;
    }

    .start-card .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 0;
    }

    .big-button {
      min-width: 176px;
      min-height: 56px;
      border-radius: 999px;
      font-size: 20px;
      background:
        radial-gradient(circle at 30% 18%, rgba(255, 255, 255, 0.88), transparent 18%),
        linear-gradient(180deg, #ff9fc4, #ff5f9b 58%, #e74788);
      box-shadow: inset 0 -5px 0 rgba(147, 28, 84, 0.24), 0 12px 22px rgba(189, 54, 116, 0.32);
      text-shadow: 0 1px 0 rgba(110, 22, 69, 0.28);
    }

    .small-button {
      min-width: 92px;
      min-height: 46px;
      border-radius: 999px;
      color: #4a3f9b;
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.95), transparent 20%),
        linear-gradient(180deg, #fff2a6, #ffd45f 58%, #ffbc47);
      box-shadow: inset 0 -4px 0 rgba(153, 105, 32, 0.2), 0 10px 18px rgba(129, 90, 42, 0.22);
    }

    @media (max-width: 620px) {
      .hud {
        grid-template-columns: 1fr;
      }

      .stats {
        max-width: calc(100vw - 24px);
      }

      .controls {
        justify-self: start;
      }

      .start-card {
        width: min(430px, 100%);
      }

      .menu-art-window {
        height: clamp(180px, 32vh, 245px);
      }
    }
  </style>
</head>
<body class="menu-mode">
  <canvas id="game" aria-label="Iris 的星星泡泡守护者游戏画布"></canvas>

  <div class="hud" aria-live="polite">
    <div class="stats">
      <span class="pill">Score <span id="score">0</span></span>
      <span class="pill">Level <span id="level">1</span></span>
      <span class="pill">爱心 <span id="hearts">💛💛💛</span></span>
      <span class="pill">星星能量 <span id="energy">0</span></span>
    </div>
    <div class="controls">
      <button id="pauseBtn" class="secondary" type="button" aria-label="暂停或继续">暂停</button>
      <button id="restartBtn" type="button" aria-label="重新开始">重来</button>
    </div>
  </div>

  <div id="message" class="message">Great job, Iris!</div>

  <div id="overlay" class="overlay">
    <section class="start-card">
      <h1>Iris 的星星泡泡守护者</h1>
      <p class="subtitle">用魔法泡泡守护星星城堡</p>
      <div class="menu-status" aria-label="游戏状态">
        <span class="menu-chip">最高分 <span id="bestScore">0</span></span>
        <span class="menu-chip">爱心 💛💛💛</span>
        <span class="menu-chip">星星城堡</span>
      </div>
      <div class="menu-art-window" aria-hidden="true"></div>
      <div class="icon-row" aria-label="游戏操作">
        <div class="icon-card"><span>↔</span><span>移动</span></div>
        <div class="icon-card"><span>●</span><span>发射</span></div>
        <div class="icon-card"><span>★</span><span>收集</span></div>
      </div>
      <div class="actions">
        <button id="startBtn" class="big-button" type="button">开始守护</button>
        <button id="settingsBtn" class="small-button" type="button">设置</button>
      </div>
    </section>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const ui = {
        score: document.getElementById("score"),
        bestScore: document.getElementById("bestScore"),
        level: document.getElementById("level"),
        hearts: document.getElementById("hearts"),
        energy: document.getElementById("energy"),
        message: document.getElementById("message"),
        overlay: document.getElementById("overlay"),
        startBtn: document.getElementById("startBtn"),
        settingsBtn: document.getElementById("settingsBtn"),
        pauseBtn: document.getElementById("pauseBtn"),
        restartBtn: document.getElementById("restartBtn")
      };

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        running: false,
        paused: false,
        gameOver: false,
        score: 0,
        bestScore: Number(localStorage.getItem("irisStarBubbleBest") || 0),
        level: 1,
        hearts: 3,
        energy: 0,
        lastTime: 0,
        spawnTimer: 0,
        spawnDelay: 1300,
        shotCooldown: 0,
        particles: [],
        bubbles: [],
        friends: [],
        stars: [],
        keys: new Set(),
        pointerActive: false,
        pointerX: 0,
        messageTimer: 0,
        player: {
          x: 0,
          y: 0,
          radius: 24,
          targetX: 0
        }
      };

      const encouragingWords = [
        "Great job, Iris!",
        "星星能量 +1!",
        "泡泡魔法成功!",
        "守护得真棒!",
        "闪闪发光!"
      ];

      function resize() {
        state.dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        state.width = Math.max(320, window.innerWidth);
        state.height = Math.max(460, window.innerHeight);
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        state.player.y = state.height - Math.max(78, state.height * 0.13);
        if (!state.running) {
          state.player.x = state.width / 2;
          state.player.targetX = state.player.x;
        }
        seedStars();
      }

      function seedStars() {
        const count = Math.floor((state.width * state.height) / 12500);
        state.stars = Array.from({ length: count }, (_, index) => ({
          x: (index * 97 + 43) % state.width,
          y: (index * 151 + 29) % state.height,
          r: 1 + ((index * 7) % 18) / 10,
          twinkle: (index % 9) / 9
        }));
      }

      function resetGame() {
        state.running = true;
        state.paused = false;
        state.gameOver = false;
        state.score = 0;
        state.level = 1;
        state.hearts = 3;
        state.energy = 0;
        state.spawnTimer = 0;
        state.spawnDelay = 1300;
        state.shotCooldown = 0;
        state.particles = [];
        state.bubbles = [];
        state.friends = [];
        state.player.x = state.width / 2;
        state.player.targetX = state.player.x;
        state.lastTime = performance.now();
        document.body.classList.remove("menu-mode");
        ui.overlay.classList.add("hidden");
        ui.pauseBtn.textContent = "暂停";
        showMessage("Great job, Iris!");
        updateHud();
      }

      function updateHud() {
        ui.score.textContent = state.score;
        ui.bestScore.textContent = state.bestScore;
        ui.level.textContent = state.level;
        ui.energy.textContent = state.energy;
        ui.hearts.textContent = "💛".repeat(Math.max(0, state.hearts)) || "♡";
      }

      function showMessage(text) {
        ui.message.textContent = text;
        ui.message.classList.add("show");
        state.messageTimer = 1500;
      }

      function togglePause() {
        if (!state.running || state.gameOver) return;
        state.paused = !state.paused;
        ui.pauseBtn.textContent = state.paused ? "继续" : "暂停";
        showMessage(state.paused ? "星星休息一下" : "继续守护星空!");
        if (!state.paused) state.lastTime = performance.now();
      }

      function shootBubble() {
        if (!state.running || state.paused || state.gameOver || state.shotCooldown > 0) return;
        const hue = (state.score * 21 + state.energy * 37) % 360;
        state.bubbles.push({
          x: state.player.x,
          y: state.player.y - 26,
          radius: 10,
          vy: -560,
          hue,
          wobble: Math.random() * Math.PI * 2
        });
        state.shotCooldown = 170;
      }

      function spawnFriend() {
        const size = 18 + Math.random() * 18;
        const isBalloon = Math.random() > 0.45;
        const speed = 48 + state.level * 9 + Math.random() * 22;
        state.friends.push({
          x: size + Math.random() * (state.width - size * 2),
          y: -size - 10,
          radius: size,
          vy: speed,
          drift: (Math.random() - 0.5) * (24 + state.level * 3),
          spin: Math.random() * Math.PI * 2,
          kind: isBalloon ? "balloon" : "meteor",
          color: isBalloon ? randomChoice(["#ff92b5", "#8de077", "#75c9ff", "#ffc75f"]) : randomChoice(["#b29cff", "#93d8ff", "#ffd36e"])
        });
      }

      function randomChoice(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function addSparkles(x, y, color) {
        for (let i = 0; i < 14; i += 1) {
          const angle = (Math.PI * 2 * i) / 14;
          const speed = 70 + Math.random() * 130;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 520 + Math.random() * 180,
            age: 0,
            color
          });
        }
      }

      function update(delta) {
        if (!state.running || state.paused || state.gameOver) return;

        state.messageTimer -= delta;
        if (state.messageTimer <= 0) ui.message.classList.remove("show");

        state.level = 1 + Math.floor(state.score / 90);
        state.spawnDelay = Math.max(620, 1320 - state.level * 78);
        state.spawnTimer += delta;
        state.shotCooldown = Math.max(0, state.shotCooldown - delta);

        while (state.spawnTimer >= state.spawnDelay) {
          state.spawnTimer -= state.spawnDelay;
          spawnFriend();
        }

        const moveSpeed = 460;
        if (state.keys.has("ArrowLeft") || state.keys.has("KeyA")) state.player.targetX -= moveSpeed * delta / 1000;
        if (state.keys.has("ArrowRight") || state.keys.has("KeyD")) state.player.targetX += moveSpeed * delta / 1000;
        if (state.pointerActive) state.player.targetX = state.pointerX;
        state.player.targetX = clamp(state.player.targetX, 28, state.width - 28);
        state.player.x += (state.player.targetX - state.player.x) * Math.min(1, delta / 90);

        for (const bubble of state.bubbles) {
          bubble.y += bubble.vy * delta / 1000;
          bubble.wobble += delta / 180;
          bubble.x += Math.sin(bubble.wobble) * 0.35;
        }
        state.bubbles = state.bubbles.filter((bubble) => bubble.y + bubble.radius > -20);

        for (const friend of state.friends) {
          friend.y += friend.vy * delta / 1000;
          friend.x += Math.sin(friend.spin) * friend.drift * delta / 1000;
          friend.spin += delta / 700;
        }

        for (const particle of state.particles) {
          particle.age += delta;
          particle.x += particle.vx * delta / 1000;
          particle.y += particle.vy * delta / 1000;
          particle.vy += 90 * delta / 1000;
        }
        state.particles = state.particles.filter((particle) => particle.age < particle.life);

        handleCollisions();
        handleMisses();
        updateHud();
      }

      function handleCollisions() {
        for (let i = state.friends.length - 1; i >= 0; i -= 1) {
          const friend = state.friends[i];
          for (let j = state.bubbles.length - 1; j >= 0; j -= 1) {
            const bubble = state.bubbles[j];
            const distance = Math.hypot(friend.x - bubble.x, friend.y - bubble.y);
            if (distance < friend.radius + bubble.radius) {
              state.friends.splice(i, 1);
              state.bubbles.splice(j, 1);
              state.score += friend.kind === "balloon" ? 12 : 16;
              state.energy += 1;
              addSparkles(friend.x, friend.y, friend.color);
              if (state.energy % 5 === 0 && state.hearts < 5) {
                state.hearts += 1;
                showMessage("爱心补充 +1!");
              } else {
                showMessage(randomChoice(encouragingWords));
              }
              break;
            }
          }
        }
      }

      function handleMisses() {
        for (let i = state.friends.length - 1; i >= 0; i -= 1) {
          const friend = state.friends[i];
          if (friend.y - friend.radius > state.height) {
            state.friends.splice(i, 1);
            state.hearts -= 1;
            showMessage("没关系，下一颗泡泡会更准!");
            if (state.hearts <= 0) endGame();
          }
        }
      }

      function endGame() {
        state.gameOver = true;
        state.running = false;
        state.bestScore = Math.max(state.bestScore, state.score);
        localStorage.setItem("irisStarBubbleBest", String(state.bestScore));
        updateHud();
        document.body.classList.add("menu-mode");
        ui.overlay.classList.remove("hidden");
        ui.overlay.querySelector("h1").textContent = "再试一次，你已经很棒了！";
        ui.overlay.querySelector(".subtitle").textContent = `Iris 得到了 ${state.score} 分`;
        ui.startBtn.textContent = "再玩一次";
      }

      function draw(time) {
        drawBackground(time);
        if (!state.running && !state.gameOver) {
          drawMenuScene(time);
        }
        if (state.running || state.gameOver) {
          drawBubbles();
          drawFriends(time);
          drawParticles();
          drawPlayer(time);
        }
        if (state.paused) drawPaused();
      }

      function drawBackground(time) {
        const sky = ctx.createLinearGradient(0, 0, 0, state.height);
        sky.addColorStop(0, "#14145c");
        sky.addColorStop(0.46, "#4a2f92");
        sky.addColorStop(0.78, "#7a68c9");
        sky.addColorStop(1, "#ffd6a0");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, state.width, state.height);

        const moonGlow = ctx.createRadialGradient(state.width * 0.78, state.height * 0.17, 10, state.width * 0.78, state.height * 0.17, Math.min(state.width, state.height) * 0.34);
        moonGlow.addColorStop(0, "rgba(255, 245, 190, 0.45)");
        moonGlow.addColorStop(1, "rgba(255, 245, 190, 0)");
        ctx.fillStyle = moonGlow;
        ctx.fillRect(0, 0, state.width, state.height);

        ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
        for (let i = 0; i < 6; i += 1) {
          const x = (i * 210 + (time / (55 + i * 8))) % (state.width + 220) - 110;
          const y = 84 + i * 55;
          drawCloud(x, y, 42 + i * 3);
        }

        for (const star of state.stars) {
          const glow = 0.45 + Math.sin(time / 500 + star.twinkle * Math.PI * 2) * 0.28;
          ctx.globalAlpha = glow;
          drawStar(star.x, star.y, star.r + 2, "#fff7a8");
        }
        ctx.globalAlpha = 1;
      }

      function drawMenuScene(time) {
        const rect = document.querySelector(".menu-art-window").getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const scale = Math.min(rect.width / 620, rect.height / 280);

        ctx.save();
        ctx.beginPath();
        ctx.rect(rect.left, rect.top, rect.width, rect.height);
        ctx.clip();

        drawMenuCloud(cx - 235 * scale, cy - 58 * scale, 34 * scale, time, 0);
        drawMenuCloud(cx + 215 * scale, cy - 42 * scale, 30 * scale, time, 1.3);
        drawMenuBubble(cx - 185 * scale, cy + 12 * scale, 20 * scale, "#9ff2ff", time, 0.2);
        drawMenuBubble(cx + 172 * scale, cy - 12 * scale, 17 * scale, "#ffb2d3", time, 1.4);
        drawMenuBubble(cx + 118 * scale, cy + 72 * scale, 13 * scale, "#fff59a", time, 2.1);
        drawStarCastle(cx + 66 * scale, cy + 34 * scale, scale, time);
        drawIrisShip(cx - 104 * scale, cy + 40 * scale, scale * 1.22, time);

        ctx.restore();
      }

      function drawMenuCloud(x, y, r, time, offset) {
        const bob = Math.sin(time / 640 + offset) * r * 0.08;
        ctx.save();
        ctx.translate(x, y + bob);
        ctx.fillStyle = "rgba(255, 255, 255, 0.86)";
        ctx.shadowColor = "rgba(112, 103, 196, 0.22)";
        ctx.shadowBlur = 18;
        drawCloud(-r * 0.9, 0, r);
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255, 202, 232, 0.34)";
        ctx.beginPath();
        ctx.ellipse(r * 0.02, r * 0.16, r * 1.35, r * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawMenuBubble(x, y, r, color, time, offset) {
        const bob = Math.sin(time / 520 + offset) * r * 0.24;
        const fill = ctx.createRadialGradient(x - r * 0.35, y - r * 0.45 + bob, 2, x, y + bob, r);
        fill.addColorStop(0, "rgba(255, 255, 255, 0.96)");
        fill.addColorStop(0.42, color);
        fill.addColorStop(1, "rgba(255, 255, 255, 0.12)");
        ctx.fillStyle = fill;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.85)";
        ctx.lineWidth = Math.max(1.5, r * 0.1);
        ctx.beginPath();
        ctx.arc(x, y + bob, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }

      function drawStarCastle(x, y, scale, time) {
        ctx.save();
        ctx.translate(x, y + Math.sin(time / 700) * 2 * scale);
        ctx.scale(scale, scale);

        ctx.fillStyle = "rgba(24, 18, 76, 0.18)";
        ctx.beginPath();
        ctx.ellipse(0, 80, 128, 16, 0, 0, Math.PI * 2);
        ctx.fill();

        const body = ctx.createLinearGradient(0, -90, 0, 84);
        body.addColorStop(0, "#ffe890");
        body.addColorStop(0.5, "#ffb8de");
        body.addColorStop(1, "#9cdcff");
        ctx.fillStyle = body;
        roundedRect(-76, -38, 152, 118, 18);
        ctx.fill();

        ctx.fillStyle = "#7b62d8";
        roundedRect(-112, -4, 48, 84, 14);
        ctx.fill();
        roundedRect(64, -4, 48, 84, 14);
        ctx.fill();

        ctx.fillStyle = "#ffd95f";
        drawStar(-88, -28, 32, "#ffd95f");
        drawStar(88, -28, 32, "#ffd95f");
        drawStar(0, -74, 44, "#fff27b");

        ctx.fillStyle = "#fff8bf";
        roundedRect(-30, 26, 60, 54, 28);
        ctx.fill();
        ctx.fillStyle = "#6b55bd";
        roundedRect(-18, 42, 36, 38, 18);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        for (const wx of [-45, 45]) {
          ctx.beginPath();
          ctx.arc(wx, 7, 13, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#83cfff";
          ctx.beginPath();
          ctx.arc(wx, 7, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ffffff";
        }

        ctx.strokeStyle = "rgba(255, 255, 255, 0.82)";
        ctx.lineWidth = 5;
        ctx.stroke();

        ctx.restore();
      }

      function drawIrisShip(x, y, scale, time) {
        ctx.save();
        ctx.translate(x, y + Math.sin(time / 520) * 4 * scale);
        ctx.rotate(Math.sin(time / 700) * 0.06);
        ctx.scale(scale, scale);

        ctx.fillStyle = "rgba(20, 14, 76, 0.18)";
        ctx.beginPath();
        ctx.ellipse(0, 76, 82, 15, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ff8fbd";
        ctx.beginPath();
        ctx.moveTo(-76, 12);
        ctx.quadraticCurveTo(-120, 28, -104, 62);
        ctx.quadraticCurveTo(-62, 58, -32, 30);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#7de7df";
        ctx.beginPath();
        ctx.moveTo(76, 12);
        ctx.quadraticCurveTo(120, 28, 104, 62);
        ctx.quadraticCurveTo(62, 58, 32, 30);
        ctx.closePath();
        ctx.fill();

        const hull = ctx.createLinearGradient(0, -68, 0, 62);
        hull.addColorStop(0, "#fff6a5");
        hull.addColorStop(0.45, "#ffd65c");
        hull.addColorStop(1, "#ff9f4d");
        drawStar(0, 0, 68, "#ffd65c");
        drawStar(0, 0, 43, "#fff6a5");

        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.beginPath();
        ctx.arc(0, -8, 36, Math.PI, 0);
        ctx.lineTo(36, 2);
        ctx.quadraticCurveTo(0, 18, -36, 2);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#513a99";
        ctx.beginPath();
        ctx.arc(-16, -6, 4.5, 0, Math.PI * 2);
        ctx.arc(16, -6, 4.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#513a99";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.arc(0, 2, 17, 0.18 * Math.PI, 0.82 * Math.PI);
        ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(-17.5, -8, 1.6, 0, Math.PI * 2);
        ctx.arc(14.5, -8, 1.6, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 4; i += 1) {
          drawMenuBubble(-70 - i * 18, 43 + i * 7, 10 - i, ["#a4f7ff", "#ffb7de", "#fff08a", "#b4ffbf"][i], time, i);
        }

        ctx.restore();
      }

      function drawCloud(x, y, r) {
        ctx.beginPath();
        ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
        ctx.arc(x + r * 0.42, y - r * 0.2, r * 0.7, 0, Math.PI * 2);
        ctx.arc(x + r * 0.98, y, r * 0.58, 0, Math.PI * 2);
        ctx.arc(x + r * 0.55, y + r * 0.18, r * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawPlayer(time) {
        const p = state.player;
        drawIrisShip(p.x, p.y, 0.36, time);
      }

      function drawBubbles() {
        for (const bubble of state.bubbles) {
          const fill = ctx.createRadialGradient(
            bubble.x - 4,
            bubble.y - 5,
            2,
            bubble.x,
            bubble.y,
            bubble.radius + 5
          );
          fill.addColorStop(0, "rgba(255, 255, 255, 0.95)");
          fill.addColorStop(0.35, `hsla(${bubble.hue}, 88%, 74%, 0.72)`);
          fill.addColorStop(1, `hsla(${bubble.hue}, 88%, 58%, 0.22)`);
          ctx.fillStyle = fill;
          ctx.strokeStyle = `hsla(${bubble.hue}, 80%, 58%, 0.72)`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }
      }

      function drawFriends(time) {
        for (const friend of state.friends) {
          ctx.save();
          ctx.translate(friend.x, friend.y);
          ctx.rotate(Math.sin(friend.spin) * 0.12);
          if (friend.kind === "balloon") {
            drawBalloonFriend(friend, time);
          } else {
            drawMeteorFriend(friend);
          }
          ctx.restore();
        }
      }

      function drawBalloonFriend(friend, time) {
        const r = friend.radius;
        ctx.fillStyle = friend.color;
        ctx.strokeStyle = "rgba(92, 69, 146, 0.32)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 0.84, r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
        ctx.beginPath();
        ctx.ellipse(-r * 0.26, -r * 0.32, r * 0.18, r * 0.28, -0.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#51406e";
        ctx.beginPath();
        ctx.arc(-r * 0.25, -r * 0.06, 2.2, 0, Math.PI * 2);
        ctx.arc(r * 0.25, -r * 0.06, 2.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#51406e";
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.arc(0, r * 0.08, r * 0.2, 0.18 * Math.PI, 0.82 * Math.PI);
        ctx.stroke();

        ctx.strokeStyle = "rgba(81, 64, 110, 0.42)";
        ctx.beginPath();
        ctx.moveTo(0, r * 0.9);
        ctx.quadraticCurveTo(Math.sin(time / 260) * 10, r * 1.25, 0, r * 1.6);
        ctx.stroke();
      }

      function drawMeteorFriend(friend) {
        const r = friend.radius;
        const gem = ctx.createLinearGradient(-r, -r, r, r);
        gem.addColorStop(0, "#fff3a8");
        gem.addColorStop(0.5, friend.color);
        gem.addColorStop(1, "#8b7ee8");
        ctx.fillStyle = gem;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.68)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -r);
        for (let i = 1; i < 10; i += 1) {
          const angle = -Math.PI / 2 + (Math.PI * 2 * i) / 10;
          const point = r * (i % 2 ? 0.78 : 1);
          ctx.lineTo(Math.cos(angle) * point, Math.sin(angle) * point);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 255, 255, 0.62)";
        ctx.beginPath();
        ctx.arc(-r * 0.25, -r * 0.25, r * 0.18, 0, Math.PI * 2);
        ctx.arc(r * 0.28, r * 0.18, r * 0.13, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#51406e";
        ctx.beginPath();
        ctx.arc(-r * 0.22, 0, 2.2, 0, Math.PI * 2);
        ctx.arc(r * 0.22, 0, 2.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#51406e";
        ctx.lineWidth = 1.7;
        ctx.beginPath();
        ctx.arc(0, r * 0.08, r * 0.18, 0.16 * Math.PI, 0.84 * Math.PI);
        ctx.stroke();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = 1 - particle.age / particle.life;
          ctx.globalAlpha = Math.max(0, alpha);
          drawStar(particle.x, particle.y, 5, particle.color);
        }
        ctx.globalAlpha = 1;
      }

      function drawStar(x, y, radius, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const angle = -Math.PI / 2 + (i * Math.PI) / 5;
          const point = i % 2 === 0 ? radius : radius * 0.45;
          ctx.lineTo(Math.cos(angle) * point, Math.sin(angle) * point);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function roundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + width - r, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + r);
        ctx.lineTo(x + width, y + height - r);
        ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        ctx.lineTo(x + r, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawPaused() {
        ctx.fillStyle = "rgba(255, 255, 255, 0.58)";
        ctx.fillRect(0, 0, state.width, state.height);
        ctx.fillStyle = "#4a3f9b";
        ctx.font = "900 34px Trebuchet MS, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("暂停中", state.width / 2, state.height / 2);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function loop(time) {
        const delta = Math.min(34, time - state.lastTime || 16);
        state.lastTime = time;
        update(delta);
        draw(time);
        requestAnimationFrame(loop);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        if (["ArrowLeft", "ArrowRight", "KeyA", "KeyD", "Space"].includes(event.code)) {
          event.preventDefault();
        }
        state.keys.add(event.code);
        if (event.code === "Space") shootBubble();
        if (event.code === "KeyP") togglePause();
      });
      window.addEventListener("keyup", (event) => state.keys.delete(event.code));

      canvas.addEventListener("pointerdown", (event) => {
        state.pointerActive = true;
        state.pointerX = event.clientX;
        state.player.targetX = event.clientX;
        shootBubble();
      });
      canvas.addEventListener("pointermove", (event) => {
        state.pointerActive = true;
        state.pointerX = event.clientX;
      });
      canvas.addEventListener("pointerup", () => {
        state.pointerActive = false;
      });
      canvas.addEventListener("pointercancel", () => {
        state.pointerActive = false;
      });

      ui.startBtn.addEventListener("click", resetGame);
      ui.restartBtn.addEventListener("click", resetGame);
      ui.pauseBtn.addEventListener("click", togglePause);

      resize();
      updateHud();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
